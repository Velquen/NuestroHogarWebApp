services:
  nuestrohogarv2_web:
    container_name: nuestrohogarv2_web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - '127.0.0.1:2001:80'
    restart: unless-stopped
